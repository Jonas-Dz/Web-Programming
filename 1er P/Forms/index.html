<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Formulario de contacto</title>
</head>

<body>
    <h2>Contacto</h2>

    <form action="#" method="post">
        <section id="entradaDatos">
            <label for="nombre">Nombre: </label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>

            <label for="correo">Correo: </label>
            <input type="email" id="correo" name="correo" required>
            <br><br>

            <label for="edad">Edad: </label>
            <input type="number" id="edad" name="edad" min="1" max="100">
            <br><br>

            <label for="provincia">Provincia: </label>
            <select name="provincia" id="provincia">
                <option value="" disabled selected>Seleccione</option>
                <option value="1">Azuay</option>
                <option value="2">Bolivar</option>
                <option value="3">Cañar</option>
            </select>
            <br><br>

            <label for="interes">Intereses: </label><br>
            <label><input type="checkbox" name="interes" value="1">5%</label><br>
            <label><input type="checkbox" name="interes" value="2">10%</label><br>
            <label><input type="checkbox" name="interes" value="3">15%</label><br>

            <label for="mensaje">Mensaje: </label><br>
            <textarea name="mensaje" id="mensaje"></textarea>
            <br>

            <label for="fecha">Fecha: </label>
            <input type="date" name="fecha" id="fecha">
            <br>

        </section>
        <section id="botones">
            <button type="submit">Enviar</button>
            <button type="reset">Limpiar</button>
            <br>
        </section>
    </form>
</body>

</html>
