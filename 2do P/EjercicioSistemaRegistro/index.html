    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Forms -->
    <h1>Sistema de Registro de Productos</h1>
    <div class="formulario">
        <input type="text" id="nombre" placeholder="Nombre del producto">

        <select id="categoria">
            <option value="">Seleccione una categoría</option>
            <option>Electrónica</option>
            <option>Ropa</option>
            <option>Alimentos</option>
            <option>Hogar</option>
        </select>

        <input type="number" id="precio" placeholder="Precio">

        <button id="btnRegistrar">
            Registrar Producto
        </button>
    </div>
    <!-- Fin Forms-->
    <!-- Tabla -->
    <br><br>
    <table id="tablaEstadisticas">
        <thead>
            <tr>
                <th>N</th>
                <th>Producto</th>
                <th>Categoria</th>
                <th>Precio ($)</th>
            </tr>
        </thead>

        <tbody id="tablaProductos"></tbody>
    </table>

    <!-- Fin Tabla -->
    <!-- Estadísticas -->
    <h2>Estadísticas</h2>

    <div class = "estadisticas">
        <p id="totalProductos">
            Total de productos: 0
        </p>

        <p id="valorTotal">
            Valor total: $0
        </p>

        <p id="promedio">
            Precio promedio: $0
        </p>

        <p id="masCaro">
            Producto más caro: -
        </p>
    </div>
    <!-- Fin Estadísticas -->

    <script src="sistemaRegistro.js"></script>
</body>

</html>
