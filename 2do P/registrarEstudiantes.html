<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
</head>
<body>

    <h1>Registro de Estudiantes</h1>
    <input type="text" id="nombre" placeholder="Ingrese el nombre">
    <br><br>
    <input type="number" id="edad" placeholder="Ingrese la edad">
    <br><br>
    <button id="btnRegistrar">
        Registrar Estudiante
    </button>
    <h3 id="contador">
        Total de estudiantes registrados: 0
    </h3>
    <div id="resultado"></div>
    <h3 id="totalEdad">
        Suma total de edades: 0
    </h3>
    <script src="registrarEstudiantes.js"></script>
</body>
</html>
